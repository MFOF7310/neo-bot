# ─────────────────────────────────────────────────────────────────
#  NEO AfriQuiz Activity — nginx config
#  Domain: bamako-steel-dev.xyz
#  Place in /etc/nginx/sites-available/ (or include in your server block)
# ─────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name bamako-steel-dev.xyz;

    # ssl_certificate     /etc/letsencrypt/live/bamako-steel-dev.xyz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bamako-steel-dev.xyz/privkey.pem;

    # ── AfriQuiz Activity (built React app) ──────────────────────
    # Deploy: npm run build && rsync -a dist/ /opt/neo-games/afriquiz/
    location /games/afriquiz/ {
        alias /opt/neo-games/afriquiz/;
        index index.html;
        try_files $uri $uri/ /games/afriquiz/index.html;

        # hashed assets — cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Discord's activity proxy fetches from many IPs — be generous
        add_header X-Content-Type-Options nosniff;
    }

    # ── AfriQuiz API → NEO bot (port 5003) ───────────────────────
    # Discord proxies iframe requests to these paths through your
    # URL mappings, so /api/... must resolve on this domain.
    location /api/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CORS is handled by the bot itself (lib/api-server.js)
    }

    # ── Optional: bot health check passthrough ────────────────────
    location = /neo-health {
        proxy_pass http://127.0.0.1:5003/health;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name bamako-steel-dev.xyz;
    return 301 https://$host$request_uri;
}
